apiVersion: platform.confluent.io/v1beta1
kind: KRaftController
metadata:
  name: kraftcontroller
  namespace: confluent
spec:
  replicas: 3
  
  image:
    application: confluentinc/cp-server:7.9.0
    init: confluentinc/confluent-init-container:2.11.0
  
  # Pod customization - ONLY these fields are supported (no nested spec)
  podTemplate:
    resources:
      requests:
        memory: "1Gi"
        cpu: "500m"
      limits:
        memory: "4Gi"
        cpu: "2"
  
  # Storage configuration
  dataVolumeCapacity: 10Gi
  storageClass:
    name: conf-storage-class
  
  # Controller listener configuration
  listeners:
    controller:
      tls:
        enabled: false
  
  # Configuration overrides for stability
  configOverrides:
    server:
      # Core replication settings
      - default.replication.factor=3
      - min.insync.replicas=2
      
      # KRaft Quorum timeout settings (CRITICAL)
      - controller.quorum.request.timeout.ms=30000
      - controller.quorum.fetch.timeout.ms=30000
      - controller.quorum.election.timeout.ms=15000
      - controller.quorum.heartbeat.interval.ms=1000
      
      # Controller socket and RPC timeouts
      - controller.socket.timeout.ms=60000
      - controller.max.poll.records=500
      - controller.quorum.voters.state.update.interval.ms=5000
      
      # Broker heartbeat settings
      - broker.heartbeat.interval.ms=3000
      - broker.session.timeout.ms=18000
      
      # Log retention (safe defaults for metadata)
      - log.retention.hours=168
      - log.segment.bytes=1073741824
      - log.cleaner.enable=true
      
      # JVM and performance tuning
      - compression.type=snappy
      - num.network.threads=8
      - num.io.threads=8
      - queued.max.requests=500
      
      # Ensure metadata durability
      - unclean.leader.election.enable=false
      - offsets.topic.replication.factor=3