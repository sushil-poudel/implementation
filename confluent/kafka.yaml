apiVersion: platform.confluent.io/v1beta1
kind: Kafka
metadata:
  name: kafka
  namespace: confluent
spec:
  replicas: 3

  image:
    application: confluentinc/cp-server:7.9.0
    init: confluentinc/confluent-init-container:2.11.0

  # Pod resource allocation - balanced for stability
  podTemplate:
    resources:
      requests:
        memory: "1Gi"
        cpu: "500m"
      limits:
        memory: "4Gi"
        cpu: "2"

  # Storage configuration
  dataVolumeCapacity: 100Gi
  storageClass:
    name: conf-storage-class

  # Kafka listeners configuration
  listeners:
    internal:
      tls:
        enabled: false
    external:
      tls:
        enabled: false

  # KRaft Controller dependency
  dependencies:
    kRaftController:
      clusterRef:
        name: kraftcontroller
        namespace: confluent
      controllerListener:
        tls:
          enabled: false

  # Configuration overrides
  configOverrides:
    server:
      # ===== BROKER <-> CONTROLLER / NETWORK TIMEOUTS =====
      - controller.socket.timeout.ms=60000
      - request.timeout.ms=60000
      - replica.socket.timeout.ms=60000
      - connections.max.idle.ms=540000

      # ===== INTERNAL TOPIC REPLICATION =====
      - offsets.topic.replication.factor=3
      - offsets.topic.num.partitions=12
      - offsets.retention.minutes=10080
      - transaction.state.log.replication.factor=3
      - transaction.state.log.min.isr=2
      - transaction.state.log.num.partitions=8
      - transaction.max.timeout.ms=900000

      # ===== GROUP COORDINATOR SETTINGS =====
      - group.coordinator.rebalance.delay.ms=3000
      - group.max.session.timeout.ms=300000
      - group.min.session.timeout.ms=6000
      - group.initial.rebalance.delay.ms=3000
      - offsets.commit.timeout.ms=5000
      - offsets.load.buffer.size=5242880

      # ===== BROKER HEARTBEAT SETTINGS (KRaft) =====
      - broker.heartbeat.interval.ms=3000
      - broker.session.timeout.ms=18000
      - broker.rack=default

      # ===== LOG RETENTION & CLEANUP =====
      - log.retention.hours=168
      - log.retention.check.interval.ms=300000
      - log.segment.bytes=1073741824
      - log.cleanup.policy=delete
      - log.cleaner.enable=true
      - log.cleaner.threads=1
      - log.cleaner.backoff.ms=15000
      - log.cleaner.min.compaction.lag.ms=0
      - log.cleaner.min.cleanable.ratio=0.5
      - log.message.timestamp.type=CreateTime
      - log.message.timestamp.difference.ms=9223372036854775807

      # ===== NETWORK THREAD POOL TUNING =====
      - num.network.threads=8
      - num.io.threads=8
      - socket.send.buffer.bytes=102400
      - socket.receive.buffer.bytes=102400
      - socket.request.max.bytes=104857600
      - queued.max.requests=500
      - max.connections.per.ip=2147483647

      # ===== REPLICATION SETTINGS =====
      - default.replication.factor=3
      - min.insync.replicas=2
      - unclean.leader.election.enable=false
      - replica.lag.time.max.ms=30000
      - replica.socket.receive.buffer.bytes=102400
      - replica.fetch.max.bytes=1048576
      - replica.fetch.response.max.bytes=10485760
      - replica.high.watermark.checkpoint.interval.ms=5000

      # ===== COMPRESSION & PERFORMANCE =====
      - compression.type=snappy
      - lz4.memory.allocation=default
      - producer.purgatory.purge.interval.requests=1000
      - fetch.purgatory.purge.interval.requests=1000
      - delete.topic.enable=true

      # ===== SECURITY & AUTHENTICATION (PLAINTEXT) =====
      - security.protocol=PLAINTEXT
      - inter.broker.security.protocol=PLAINTEXT
      # sasl.mechanism.inter.broker.protocol removed – only needed if using SASL

      # ===== CONFLUENT METRICS REPORTER =====
      - metric.reporters=io.confluent.metrics.reporter.ConfluentMetricsReporter
      - confluent.metrics.reporter.bootstrap.servers=kafka:9092
      - confluent.metrics.reporter.topic.replicas=3
      - confluent.metrics.reporter.publish.ms=30000
      - confluent.metrics.reporter.max.in.flight.requests=5
      - confluent.metrics.reporter.compression.codec=snappy

      # ===== SCHEMA REGISTRY INTEGRATION =====
      - schema.registry.url=http://schemaregistry:8081

      # ===== GENERAL BROKER SETTINGS =====
      - auto.create.topics.enable=true
      - auto.leader.rebalance.enable=true
      - leader.imbalance.check.interval.seconds=300
      - leader.imbalance.per.broker.percentage=10
      - offsets.retention.check.interval.ms=600000
      - message.max.bytes=1048576
      - replica.fetch.min.bytes=1
      - replica.fetch.wait.max.ms=500
      - fetch.min.bytes=1
      - fetch.wait.max.ms=500